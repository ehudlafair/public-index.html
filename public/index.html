<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#fff8ee">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="אחזקה">
<title>סוכן אחזקה ביתית</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:system-ui,-apple-system,sans-serif;background:#faf7f2;color:#2d2010;min-height:100vh;padding-bottom:84px}
button{cursor:pointer;font-family:inherit}
input,textarea{font-family:inherit}

/* TOPBAR */
.topbar{background:#fff8ee;padding:14px 16px 10px;border-bottom:1px solid #eddfc8;position:sticky;top:0;z-index:10}
.topbar-row{display:flex;align-items:center;justify-content:space-between}
.app-title{font-size:19px;font-weight:800;color:#2d2010;display:flex;align-items:center;gap:8px}
.subtitle{font-size:12px;color:#a07848;margin-top:2px}
.badge{background:#e07820;color:#fff;border-radius:999px;padding:2px 9px;font-size:12px;font-weight:700}

/* PAGES */
.page{padding:16px;display:none}
.page.active{display:block}

/* HERO ILLUSTRATION */
.hero{background:#fff8ee;border-radius:16px;padding:16px;margin-bottom:16px;border:1px solid #eddfc8;display:flex;align-items:center;gap:14px}
.hero-text h2{font-size:15px;font-weight:700;color:#2d2010}
.hero-text p{font-size:12px;color:#a07848;margin-top:3px;line-height:1.5}

/* CARDS */
.card{background:#fff;border-radius:14px;padding:14px 16px;margin-bottom:10px;border:1px solid #eddfc8}
.card-red{border-right:4px solid #dc2626;border-radius:0 14px 14px 0}
.card-orange{border-right:4px solid #e07820}
.card-yellow{border-right:4px solid #d97706}
.card-green{border-right:4px solid #16a34a}
.machine-name{font-weight:700;font-size:14px;color:#2d2010}
.task-title{font-size:13px;color:#5a3810;margin-top:2px}
.task-desc{font-size:12px;color:#a07848;margin-top:4px;line-height:1.5}
.task-meta{display:flex;gap:10px;align-items:center;margin-top:8px;flex-wrap:wrap}
.status-badge{font-size:12px;font-weight:700}
.interval-badge{font-size:11px;color:#b08858;background:#fff3e0;padding:2px 8px;border-radius:999px}
.yt-link{font-size:12px;color:#e07820;text-decoration:none;font-weight:600}
.done-btn{padding:7px 14px;border-radius:20px;border:none;background:#16a34a;color:#fff;font-size:12px;font-weight:700;white-space:nowrap;box-shadow:0 2px 6px rgba(22,163,74,.25)}
.del-btn{padding:5px 12px;border-radius:20px;border:none;background:#fff0f0;color:#dc2626;font-size:12px;font-weight:600;border:1px solid #fecaca}
.card-row{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.history-dates{font-size:11px;color:#c8a878;margin-top:6px}

/* URGENT */
.urgent-wrap{background:#fff0e8;border-radius:14px;padding:14px;margin-bottom:16px;border:1px solid #fcd9b0}
.urgent-title{font-size:13px;color:#b04000;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.section-title{font-size:13px;color:#a07848;margin-bottom:10px;font-weight:600}

/* ADD PAGE */
.add-section{background:#fff;border-radius:14px;padding:16px;margin-bottom:14px;border:1px solid #eddfc8}
.add-label{font-size:13px;color:#a07848;margin-bottom:10px;font-weight:600}
.upload-btn{width:100%;padding:28px 0;border-radius:12px;border:2px dashed #e0c898;background:#fffaf4;color:#b08858;font-size:14px;font-weight:600}
.upload-btn:active{background:#fff3e0}
.preview-img{width:100%;max-height:200px;object-fit:contain;border-radius:10px;margin-bottom:8px}
.remove-img{font-size:12px;color:#a07848;background:none;border:none;display:block;margin:0 auto 4px}
.text-input{width:100%;padding:12px 14px;border-radius:12px;border:1.5px solid #e0c898;background:#fffaf4;color:#2d2010;font-size:14px}
.text-input:focus{outline:none;border-color:#e07820;background:#fff}
.or-divider{text-align:center;color:#c8a878;font-size:13px;margin:2px 0 12px}

/* BUTTONS */
.primary-btn{width:100%;padding:14px 0;border-radius:14px;border:none;background:#e07820;color:#fff;font-size:15px;font-weight:800;box-shadow:0 3px 10px rgba(224,120,32,.3);letter-spacing:.2px}
.primary-btn:active{transform:scale(.98)}
.primary-btn:disabled{background:#e0c898;color:#a08848;box-shadow:none}
.success-btn{background:#16a34a;box-shadow:0 3px 10px rgba(22,163,74,.3)}
.back-btn{flex:1;padding:13px 0;border-radius:14px;border:1.5px solid #e0c898;background:#fff;color:#a07848;font-size:14px;font-weight:600}
.btn-row{display:flex;gap:10px;margin-top:8px}
.identified-input{width:100%;padding:12px 14px;border-radius:12px;border:1.5px solid #e07820;background:#fffaf4;color:#2d2010;font-size:15px;font-weight:700}
.identified-input:focus{outline:none}
.hint{font-size:12px;color:#b08858;margin-top:6px}
.fetched-card{background:#fffaf4;border-radius:12px;padding:12px 14px;margin-bottom:8px;border:1px solid #eddfc8}
.fetched-title{font-weight:700;font-size:14px;color:#2d2010}
.fetched-desc{font-size:12px;color:#a07848;margin-top:3px}
.fetched-interval{font-size:12px;color:#e07820;margin-top:4px;font-weight:600}
.error-msg{color:#dc2626;font-size:13px;margin:8px 0;background:#fff0f0;padding:8px 12px;border-radius:8px}
.empty-state{text-align:center;padding:50px 0;color:#b08858}
.empty-icon{font-size:52px;margin-bottom:12px}

/* SPINNER */
.spinner{display:inline-block;width:15px;height:15px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-left:6px}
.spinner-dark{border:2px solid #e0c898;border-top-color:#e07820}
@keyframes spin{to{transform:rotate(360deg)}}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff8ee;border-top:1px solid #eddfc8;display:flex;z-index:20;padding-bottom:env(safe-area-inset-bottom)}
.nav-btn{flex:1;padding:10px 0 8px;border:none;background:transparent;color:#b08858;font-size:10px;display:flex;flex-direction:column;align-items:center;gap:2px;font-weight:600}
.nav-btn.active{color:#e07820}
.nav-icon{font-size:22px;line-height:1}
.nav-dot{width:5px;height:5px;border-radius:50%;background:#e07820;margin-top:2px}

/* CHAT */
#page-chat{display:none;flex-direction:column;padding:0;height:calc(100vh - 120px)}
#page-chat.active{display:flex}
.chat-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
.msg{max-width:82%;padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.5;word-break:break-word}
.msg-user{background:#e07820;color:#fff;align-self:flex-start;border-bottom-left-radius:4px}
.msg-bot{background:#fff;color:#2d2010;align-self:flex-end;border-bottom-right-radius:4px;border:1px solid #eddfc8;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.typing{background:#fff;color:#b08858;align-self:flex-end;padding:10px 16px;border-radius:16px;font-size:14px;border-bottom-right-radius:4px;border:1px solid #eddfc8}
.chat-input-wrap{padding:10px 14px 12px;background:#fff8ee;border-top:1px solid #eddfc8;display:flex;gap:8px;align-items:flex-end}
.chat-input{flex:1;padding:10px 14px;border-radius:20px;border:1.5px solid #e0c898;background:#fff;color:#2d2010;font-size:14px;resize:none;max-height:100px;line-height:1.4}
.chat-input:focus{outline:none;border-color:#e07820}
.chat-send{width:42px;height:42px;border-radius:50%;border:none;background:#e07820;color:#fff;font-size:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 8px rgba(224,120,32,.35)}
.chat-send:disabled{background:#e0c898;box-shadow:none}
.quick-btns{display:flex;gap:6px;flex-wrap:wrap;padding:10px 14px 0}
.quick-btn{padding:7px 14px;border-radius:20px;border:1.5px solid #e0c898;background:#fff;color:#7a4e10;font-size:12px;font-weight:600;white-space:nowrap}
.quick-btn:active{background:#fff3e0}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-row">
    <div class="app-title">
      <svg width="26" height="26" viewBox="0 0 26 26" fill="none">
        <circle cx="13" cy="13" r="12" fill="#fff3e0"/>
        <path d="M8 18l2-4 3 2 3-2 2 4" stroke="#e07820" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="13" cy="10" r="3" stroke="#e07820" stroke-width="1.5"/>
        <path d="M13 7V5M13 15v2M7 10H5M21 10h-2" stroke="#e07820" stroke-width="1" stroke-linecap="round" opacity=".5"/>
      </svg>
      אחזקה ביתית
    </div>
    <span id="urgent-badge" style="display:none" class="badge"></span>
  </div>
  <div class="subtitle" id="subtitle">טוען נתונים...</div>
</div>

<!-- DASHBOARD -->
<div class="page active" id="page-dashboard">
  <div id="urgent-section"></div>
  <div id="tasks-section"></div>
</div>

<!-- MACHINES -->
<div class="page" id="page-machines">
  <div id="machines-list"></div>
</div>

<!-- ADD -->
<div class="page" id="page-add">
  <div id="add-content"></div>
</div>

<!-- CHAT -->
<div class="page" id="page-chat">
  <div class="quick-btns" id="quick-btns">
    <button class="quick-btn" onclick="quickSend('מה הטיפול הבא שאני צריך לעשות?')">מה הטיפול הבא?</button>
    <button class="quick-btn" onclick="quickSend('שמעתי רעש חריג, מה זה יכול להיות?')">שמעתי רעש חריג</button>
    <button class="quick-btn" onclick="quickSend('מתי לקרוא לטכנאי ומתי לטפל לבד?')">טכנאי או לבד?</button>
    <button class="quick-btn" onclick="quickSend('תן לי טיפים כלליים לאחזקה ביתית')">טיפים כלליים</button>
  </div>
  <div class="chat-messages" id="chat-messages"></div>
  <div class="chat-input-wrap">
    <textarea class="chat-input" id="chat-input" placeholder="שאל שאלה על אחזקה..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="chat-send" id="chat-send" onclick="sendChat()">↑</button>
  </div>
</div>

<div class="bottom-nav">
  <button class="nav-btn active" id="nav-dashboard" onclick="showPage('dashboard')">
    <span class="nav-icon">📋</span>לוח
  </button>
  <button class="nav-btn" id="nav-machines" onclick="showPage('machines')">
    <span class="nav-icon">🏠</span>מכונות
  </button>
  <button class="nav-btn" id="nav-add" onclick="showPage('add')">
    <span class="nav-icon">➕</span>הוסף
  </button>
  <button class="nav-btn" id="nav-chat" onclick="showPage('chat')">
    <span class="nav-icon">💬</span>עזרה
  </button>
</div>

<script>
const SB_URL="https://okstufzjutugkxnkdpbm.supabase.co";
const SB_KEY="sb_publishable_OBFRm420-m9Urj1rIM-9uA_XllSEX-W";
const H={"Content-Type":"application/json","apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"Prefer":"return=representation"};

let machines=[],tasks=[],chatHistory=[],addStep="input",imgBase64=null,imgPreview=null,identifiedName="",fetchedTasks=[];

async function dbGet(t){const r=await fetch(`${SB_URL}/rest/v1/${t}?select=*`,{headers:H});return r.json();}
async function dbInsert(t,d){const r=await fetch(`${SB_URL}/rest/v1/${t}`,{method:"POST",headers:H,body:JSON.stringify(d)});return r.json();}
async function dbUpdate(t,id,d){await fetch(`${SB_URL}/rest/v1/${t}?id=eq.${id}`,{method:"PATCH",headers:H,body:JSON.stringify(d)});}
async function dbDelete(t,id){await fetch(`${SB_URL}/rest/v1/${t}?id=eq.${id}`,{method:"DELETE",headers:H});}

function today(){return new Date().toISOString().split("T")[0];}
function addMonths(d,m){const dt=new Date(d);dt.setMonth(dt.getMonth()+m);return dt.toISOString().split("T")[0];}
function daysUntil(d){return Math.ceil((new Date(d)-new Date(today()))/86400000);}
function sColor(days){return days<0?"#dc2626":days<=7?"#e07820":days<=30?"#d97706":"#16a34a";}
function sLabel(days){if(days<0)return`⚠️ באיחור ${Math.abs(days)} ימים`;if(days===0)return"⚡ היום!";return`בעוד ${days} ימים`;}
function cClass(days){return days<0?"card card-red":days<=7?"card card-orange":days<=30?"card card-yellow":"card card-green";}

/* HERO SVG — illustrated robot mascot */
function heroSVG(){
  return`<svg width="70" height="70" viewBox="0 0 70 70" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="35" cy="35" r="34" fill="#fff3e0"/>
    <!-- body -->
    <rect x="20" y="32" width="30" height="22" rx="6" fill="#e07820"/>
    <rect x="24" y="36" width="22" height="14" rx="4" fill="#fff8ee"/>
    <!-- head -->
    <rect x="23" y="14" width="24" height="20" rx="7" fill="#f59332"/>
    <!-- eyes -->
    <circle cx="29" cy="22" r="3.5" fill="#fff"/>
    <circle cx="41" cy="22" r="3.5" fill="#fff"/>
    <circle cx="30" cy="22.5" r="2" fill="#2d2010"/>
    <circle cx="42" cy="22.5" r="2" fill="#2d2010"/>
    <circle cx="31" cy="21.5" r=".7" fill="#fff"/>
    <circle cx="43" cy="21.5" r=".7" fill="#fff"/>
    <!-- mouth smile -->
    <path d="M29 28.5 Q35 32 41 28.5" stroke="#fff8ee" stroke-width="1.5" stroke-linecap="round" fill="none"/>
    <!-- antenna -->
    <line x1="35" y1="14" x2="35" y2="8" stroke="#e07820" stroke-width="2" stroke-linecap="round"/>
    <circle cx="35" cy="6.5" r="2.5" fill="#f59332"/>
    <!-- arms -->
    <rect x="9" y="35" width="11" height="6" rx="3" fill="#f59332"/>
    <rect x="50" y="35" width="11" height="6" rx="3" fill="#f59332"/>
    <!-- wrench in right hand -->
    <path d="M57 33 L63 27" stroke="#e07820" stroke-width="2" stroke-linecap="round"/>
    <circle cx="63.5" cy="26.5" r="2.5" stroke="#e07820" stroke-width="1.5" fill="none"/>
    <!-- legs -->
    <rect x="25" y="53" width="8" height="10" rx="3" fill="#f59332"/>
    <rect x="37" y="53" width="8" height="10" rx="3" fill="#f59332"/>
    <!-- panel lights -->
    <circle cx="29" cy="40" r="2" fill="#16a34a"/>
    <circle cx="35" cy="40" r="2" fill="#e07820"/>
    <circle cx="41" cy="40" r="2" fill="#dc2626"/>
    <rect x="27" y="45" width="16" height="3" rx="1.5" fill="#e0c898"/>
  </svg>`;
}

async function load(){
  machines=await dbGet("machines");tasks=await dbGet("tasks");
  renderDashboard();renderMachines();
}

function renderDashboard(){
  const sorted=[...tasks].sort((a,b)=>new Date(a.next_date)-new Date(b.next_date));
  const urgent=sorted.filter(t=>daysUntil(t.next_date)<=7);
  const badge=document.getElementById("urgent-badge");
  if(urgent.length>0){badge.textContent=urgent.length;badge.style.display="inline";}else badge.style.display="none";
  document.getElementById("subtitle").textContent=`${machines.length} מכונות · ${tasks.length} טיפולים רשומים`;

  const us=document.getElementById("urgent-section");
  if(urgent.length>0){
    us.innerHTML=`<div class="urgent-wrap"><div class="urgent-title">🔴 דורש טיפול עכשיו</div>${urgent.map(t=>{
      const d=daysUntil(t.next_date);
      return`<div style="background:#fff;border-radius:10px;padding:10px 14px;margin-bottom:8px;border:1px solid #fcd9b0"><div class="card-row">
        <div><div class="machine-name">${t.machine_name}</div><div class="task-title">${t.title}</div>
        <div style="font-size:12px;font-weight:700;color:#dc2626;margin-top:4px">${sLabel(d)}</div></div>
        <button class="done-btn" onclick="markDone('${t.id}')">✓ בוצע</button></div></div>`;
    }).join("")}</div>`;
  }else us.innerHTML="";

  const ts=document.getElementById("tasks-section");
  if(sorted.length===0){
    ts.innerHTML=`<div style="text-align:center;padding:20px 0 30px">${heroSVG()}<p style="color:#b08858;font-size:14px;margin-top:12px">ברוך הבא!<br>הוסף את המכונות שלך כדי להתחיל</p>
    <button onclick="showPage('add')" class="primary-btn" style="margin-top:14px;width:auto;padding:12px 28px">➕ הוסף מכונה ראשונה</button></div>`;
    return;
  }
  ts.innerHTML=`<div class="section-title">כל הטיפולים</div>`+sorted.map(t=>{
    const d=daysUntil(t.next_date);
    const yt=`https://www.youtube.com/results?search_query=${encodeURIComponent(t.youtube_query||t.title)}`;
    const hist=(t.history||[]).slice(-3).join(", ");
    return`<div class="${cClass(d)}"><div class="card-row"><div style="flex:1">
      <div class="machine-name">${t.machine_name}</div>
      <div class="task-title">${t.title}</div>
      <div class="task-desc">${t.description||""}</div>
      <div class="task-meta">
        <span class="status-badge" style="color:${sColor(d)}">${sLabel(d)}</span>
        <span class="interval-badge">כל ${t.interval_months} חודשים</span>
        <a class="yt-link" href="${yt}" target="_blank">▶ יוטיוב</a>
      </div>${hist?`<div class="history-dates">בוצע: ${hist}</div>`:""}</div>
      <button class="done-btn" onclick="markDone('${t.id}')">✓ בוצע</button></div></div>`;
  }).join("");
}

function renderMachines(){
  const el=document.getElementById("machines-list");
  if(machines.length===0){
    el.innerHTML=`<div class="empty-state">${heroSVG()}<p style="margin-top:12px">אין מכונות עדיין</p></div>`;return;
  }
  el.innerHTML=`<div class="section-title">המכונות שלך</div>`+machines.map(m=>{
    const mt=tasks.filter(t=>t.machine_id===m.id);
    const next=mt.sort((a,b)=>new Date(a.next_date)-new Date(b.next_date))[0];
    const nd=next?daysUntil(next.next_date):null;
    return`<div class="card"><div class="card-row">
      <div>
        <div class="machine-name">${m.name}</div>
        <div style="font-size:12px;color:#a07848;margin-top:3px">${mt.length} טיפולים${next?` · טיפול הבא <span style="color:${sColor(nd)};font-weight:600">${sLabel(nd)}</span>`:""}</div>
      </div>
      <button class="del-btn" onclick="deleteMachine('${m.id}')">מחק</button>
    </div></div>`;
  }).join("");
}

async function markDone(id){
  const t=tasks.find(x=>x.id===id);if(!t)return;
  const nn=addMonths(today(),t.interval_months),nh=[...(t.history||[]),today()];
  await dbUpdate("tasks",id,{next_date:nn,history:nh});
  t.next_date=nn;t.history=nh;renderDashboard();
}

async function deleteMachine(id){
  if(!confirm("למחוק מכונה זו וכל הטיפולים שלה?"))return;
  await dbDelete("machines",id);
  machines=machines.filter(m=>m.id!==id);tasks=tasks.filter(t=>t.machine_id!==id);
  renderDashboard();renderMachines();
}

function renderAdd(){
  const el=document.getElementById("add-content");
  if(addStep==="input"){
    el.innerHTML=`
    <div style="text-align:center;margin-bottom:16px">${heroSVG()}<div style="font-size:14px;font-weight:700;color:#2d2010;margin-top:8px">הוסף מכונה חדשה</div><div style="font-size:12px;color:#a07848;margin-top:2px">צלם את המוצר או הקלד את שמו</div></div>
    <div class="add-section">
      <div class="add-label">📷 צלם או העלה תמונה</div>
      <input type="file" id="file-input" accept="image/*" capture="environment" style="display:none" onchange="handleImage(this)">
      ${imgPreview?`<img src="${imgPreview}" class="preview-img"><button class="remove-img" onclick="clearImg()">✕ הסר תמונה</button>`:`<button class="upload-btn" onclick="document.getElementById('file-input').click()">📷 לחץ לצילום / העלאה</button>`}
    </div>
    <div class="or-divider">— או —</div>
    <div class="add-section">
      <div class="add-label">✏️ הקלד שם המוצר</div>
      <input class="text-input" id="manual-name" placeholder="לדוגמה: Toyota Corolla 2018" value="">
    </div>
    <div id="add-error" class="error-msg" style="display:none"></div>
    <button class="primary-btn" id="identify-btn" onclick="identifyMachine()">🔍 זהה מוצר</button>`;
  }else if(addStep==="identified"){
    el.innerHTML=`
    <div class="add-section">
      <div class="add-label">✅ זוהה — ניתן לערוך:</div>
      <input class="identified-input" id="id-name" value="${identifiedName}">
      <div class="hint">ערוך אם הזיהוי לא מדויק</div>
    </div>
    <div id="add-error" class="error-msg" style="display:none"></div>
    <div class="btn-row">
      <button class="back-btn" onclick="resetAdd()">חזור</button>
      <button class="primary-btn" style="flex:2" id="fetch-btn" onclick="fetchTasks()">🔎 חפש טיפולים תקופתיים</button>
    </div>`;
  }else if(addStep==="tasks"){
    el.innerHTML=`
    <div style="font-size:13px;color:#a07848;margin-bottom:12px;font-weight:600">נמצאו ${fetchedTasks.length} טיפולים עבור ${identifiedName}:</div>
    ${fetchedTasks.map(t=>`<div class="fetched-card"><div class="fetched-title">${t.title}</div><div class="fetched-desc">${t.description}</div><div class="fetched-interval">כל ${t.intervalMonths} חודשים</div></div>`).join("")}
    <div id="add-error" class="error-msg" style="display:none"></div>
    <div class="btn-row">
      <button class="back-btn" onclick="addStep='identified';renderAdd()">חזור</button>
      <button class="primary-btn success-btn" style="flex:2" onclick="saveMachine()">✅ הוסף מכונה</button>
    </div>`;
  }
}

function handleImage(input){
  const file=input.files[0];if(!file)return;
  const canvas=document.createElement("canvas"),img=new Image(),reader=new FileReader();
  reader.onload=e=>{
    imgPreview=e.target.result;
    img.onload=()=>{
      const MAX=1024;let w=img.width,h=img.height;
      if(w>MAX||h>MAX){if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;}}
      canvas.width=w;canvas.height=h;
      canvas.getContext("2d").drawImage(img,0,0,w,h);
      imgBase64=canvas.toDataURL("image/jpeg",.85).split(",")[1];
      renderAdd();
    };img.src=e.target.result;
  };reader.readAsDataURL(file);
}
function clearImg(){imgBase64=null;imgPreview=null;renderAdd();}
function showError(msg){const el=document.getElementById("add-error");if(el){el.textContent=msg;el.style.display="block";}}

async function callClaude(msgs,sys,search=false){
  const body={model:"claude-sonnet-4-20250514",max_tokens:1000,system:sys,messages:msgs};
  if(search)body.tools=[{type:"web_search_20250305",name:"web_search"}];
  const r=await fetch("/api/claude",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
  return r.json();
}

async function identifyMachine(){
  const manual=document.getElementById("manual-name")?.value?.trim()||"";
  if(!imgBase64&&!manual)return;
  const btn=document.getElementById("identify-btn");
  btn.disabled=true;btn.innerHTML=`מזהה... <span class="spinner"></span>`;
  try{
    const content=imgBase64
      ?[{type:"image",source:{type:"base64",media_type:"image/jpeg",data:imgBase64}},{type:"text",text:'Identify this appliance/machine/vehicle. Return ONLY valid JSON, no markdown: {"name":"full product name including brand and model"}'}]
      :manual;
    const data=await callClaude([{role:"user",content}],'You identify home appliances, vehicles and machines. Return ONLY valid JSON: {"name":"..."}. Best guess if unsure.');
    let name=manual;
    const tb=data.content?.find(b=>b.type==="text");
    if(tb){try{name=JSON.parse(tb.text.replace(/```json|```/g,"").trim()).name||name;}catch{}}
    identifiedName=name;addStep="identified";renderAdd();
  }catch(e){showError("שגיאה בזיהוי. נסה שוב.");btn.disabled=false;btn.innerHTML="🔍 זהה מוצר";}
}

async function fetchTasks(){
  identifiedName=document.getElementById("id-name")?.value?.trim()||identifiedName;
  const btn=document.getElementById("fetch-btn");
  btn.disabled=true;btn.innerHTML=`מחפש... <span class="spinner"></span>`;
  try{
    const data=await callClaude([{role:"user",content:`חפש ברשת טיפולים תקופתיים עבור: ${identifiedName}.\nהחזר JSON בלבד:\n{"tasks":[{"title":"שם","description":"איך עושים","intervalMonths":מספר,"youtubeQuery":"english search"}]}`}],"מומחה אחזקה. החזר JSON בלבד ללא markdown.",true);
    const tb=data.content?.find(b=>b.type==="text");
    if(tb){const p=JSON.parse(tb.text.replace(/```json|```/g,"").trim());fetchedTasks=p.tasks||[];addStep="tasks";renderAdd();}
  }catch(e){showError("שגיאה בחיפוש. נסה שוב.");btn.disabled=false;btn.innerHTML="🔎 חפש טיפולים תקופתיים";}
}

async function saveMachine(){
  const mArr=await dbInsert("machines",{name:identifiedName,added_date:today()});
  const machine=Array.isArray(mArr)?mArr[0]:mArr;
  const rows=fetchedTasks.map(t=>({machine_id:machine.id,machine_name:identifiedName,title:t.title,description:t.description,interval_months:t.intervalMonths,youtube_query:t.youtubeQuery,next_date:addMonths(today(),t.intervalMonths),history:[]}));
  await dbInsert("tasks",rows);
  machines.push(machine);tasks=await dbGet("tasks");
  resetAdd();showPage("dashboard");
}

function resetAdd(){addStep="input";imgBase64=null;imgPreview=null;identifiedName="";fetchedTasks=[];renderAdd();}

function buildSys(){
  const ml=machines.length>0?machines.map(m=>{const mt=tasks.filter(t=>t.machine_id===m.id).map(t=>`  - ${t.title} (כל ${t.interval_months} חודשים, הבא: ${t.next_date})`).join("\n");return`• ${m.name}\n${mt}`;}).join("\n"):"אין מכונות רשומות.";
  return`אתה סוכן אחזקה ביתית ידידותי ומקצועי. עונה בעברית בלבד, בצורה חמה וברורה.\n\nמכונות המשתמש:\n${ml}\n\nתפקידך: אבחון תקלות, עצות טיפול, מתי לקרוא לטכנאי vs לבד, טיפים לאחזקה. כשיש ספק — המלץ על טכנאי.`;
}

function addMsg(text,role){
  const w=document.getElementById("chat-messages"),d=document.createElement("div");
  d.className=`msg msg-${role}`;d.innerHTML=text.replace(/\n/g,"<br>");
  w.appendChild(d);w.scrollTop=w.scrollHeight;
}
function showTyping(){const w=document.getElementById("chat-messages"),d=document.createElement("div");d.className="typing";d.id="typing";d.innerHTML='<span class="spinner spinner-dark"></span> מקליד...';w.appendChild(d);w.scrollTop=w.scrollHeight;}
function removeTyping(){const el=document.getElementById("typing");if(el)el.remove();}

async function sendChat(){
  const inp=document.getElementById("chat-input"),text=inp.value.trim();
  if(!text)return;
  inp.value="";autoResize(inp);
  document.getElementById("quick-btns").style.display="none";
  addMsg(text,"user");chatHistory.push({role:"user",content:text});
  document.getElementById("chat-send").disabled=true;
  showTyping();
  try{
    const data=await callClaude(chatHistory,buildSys());removeTyping();
    const tb=data.content?.find(b=>b.type==="text");
    const reply=tb?.text||"מצטער, לא הצלחתי לענות. נסה שוב.";
    addMsg(reply,"bot");chatHistory.push({role:"assistant",content:reply});
    if(chatHistory.length>20)chatHistory=chatHistory.slice(-20);
  }catch(e){removeTyping();addMsg("שגיאה בתקשורת. בדוק חיבור אינטרנט.","bot");}
  document.getElementById("chat-send").disabled=false;
}

function quickSend(t){document.getElementById("chat-input").value=t;sendChat();}
function handleKey(e){if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendChat();}}
function autoResize(el){el.style.height="auto";el.style.height=Math.min(el.scrollHeight,100)+"px";}

function showPage(name){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active"));
  document.getElementById("page-"+name).classList.add("active");
  document.getElementById("nav-"+name).classList.add("active");
  if(name==="add")renderAdd();
  if(name==="chat"&&chatHistory.length===0){addMsg("שלום! אני סוכן האחזקה שלך 🔧\nשאל אותי כל שאלה — תקלות, טיפולים, מתי לקרוא לטכנאי ועוד.","bot");}
}

load();
</script>
</body>
</html>
